{% extends 'core/base.html' %}

{% block content %}
<div class="login-wrapper">
    <div class="login-card">
        <h2><i class="fas fa-lock"></i> Secure Login</h2>
        <form method="POST">
            {% csrf_token %}
            
            <div class="form-group">
                <label for="role">Select Role</label>
                <select name="role" id="role" class="form-control" onchange="togglePassword()">
                    <option value="WFM">WFM</option>
                    <option value="Supervisor">Supervisor</option>
                    <option value="Agent">Agent</option>
                </select>
            </div>

            <div class="form-group" id="password-group">
                <label for="password">Password</label>
                <input type="password" name="password" id="password" class="form-control" placeholder="••••••••">
            </div>

            <button type="submit" class="btn-login">Login <i class="fas fa-arrow-right"></i></button>
        </form>
    </div>
</div>

<script>
    function togglePassword() {
        const selectedRole = document.getElementById('role').value;
        const passGroup = document.getElementById('password-group');
        const passInput = document.getElementById('password');

        if (selectedRole === 'Agent') {
            passGroup.style.display = 'none';
            passInput.removeAttribute('required');
        } else {
            passGroup.style.display = 'block';
            passInput.setAttribute('required', 'required');
        }
    }
    
    // Initialize on load
    window.onload = togglePassword;
</script>
{% endblock %}
